<template>
    <lightning-card title={title}>

        <template if:true={isAccountSelected}>
            <lightning-button-icon icon-name="utility:adduser" alternative-text="Add contact"
                class="slds-m-left_xx-small" title="Add Contact" onclick={handleAddContact}></lightning-button-icon>


            <template if:true={contacts}>
                <template for:each={contacts} for:item="contact">
                    <lightning-layout key={contact.Id} class="slds-box slds-m-around_small">
                        <lightning-layout-item size="10px">
                            <b>{contact.Name}</b>
                        </lightning-layout-item>

                        <lightning-layout-item size="2px">
                            <lightning-button-icon icon-name="utility:edit" alternative-text="Edit"
                                class="slds-m-left_xx-small" title="Edit" onclick={handleEdit} data-contact-id={contact.Id}></lightning-button-icon>
                            <lightning-button-icon icon-name="utility:delete" alternative-text="Delete"
                                class="slds-m-left_xx-small" title="Delete" onclick={handleDelete} data-contact-id={contact.Id}></lightning-button-icon>
                        </lightning-layout-item>
                    </lightning-layout>
                </template>
            </template>
            <template if:false={hasContacts}>
                <div class="slds-align_absolute-center">
                    No Contacts Found
                </div>
            </template>

            <template if:false={isAccountSelected}>
                <div class="slds-align_absolute-center">
                    No Accounts selected
                </div>
            </template>
        </template>

        <!-- Add Contact Modal -->
        <template if:true={isAddContactClicked}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="add-contact-heading"
                class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!-- Header -->
                    <header class="slds-modal__header">
                        <h2 id="add-contact-heading" class="slds-text-heading_medium">
                            Add Contact
                        </h2>
                    </header>

                    <!-- Body -->
                     <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
                    <lightning-record-edit-form object-api-name="Contact" record-id={recordId} onsuccess={handleSuccess}>
                        <lightning-input-field field-name="Name"> </lightning-input-field>
                        <lightning-input-field field-name="AccountId" value ={accountId}> </lightning-input-field>
                        <div class="slds-var-m-top_medium">
                            <lightning-button variant="brand" type="submit" label="Save">
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                    </div>
                    <!-- Footer -->
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel"
                            onclick={handleAddContactCancel}></lightning-button>
                    </footer>

                </div>
            </section>

            <!-- Backdrop -->
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={isEditClicked}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="edit-contact-heading"
                class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!-- Header -->
                    <header class="slds-modal__header">
                        <h2 id="edit-contact-heading" class="slds-text-heading_medium">
                            Edit Contact
                        </h2>
                    </header>

                    <!-- Body -->
                     <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-3">
                    <lightning-record-edit-form object-api-name="Contact" record-id={editableContactId} onsuccess={handleSuccess}>
                        <lightning-input-field field-name="Name"> </lightning-input-field>
                        <lightning-input-field field-name="AccountId" value ={accountId}> </lightning-input-field>
                        <div class="slds-var-m-top_medium">
                            <lightning-button variant="brand" type="submit" label="Save">
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                    </div>

                    <!-- Footer -->
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel"
                            onclick={handleEditCancel}></lightning-button>
                    </footer>

                </div>
            </section>

            <!-- Backdrop -->
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
