<template>
    <lightning-card>
        <h1>Ierator Example</h1>
        <table class="slds-table slds-table_bordered">
            <thead>
                <tr>
                    <td>First Name</td>
                    <td>Last Name</td>
                    <td>Age</td>
                    <td>City</td>
                    <td>Country</td>
                </tr>
            </thead>
            <template iterator:emp={employeeList}>
                <template if:true={emp.first}>
                    <tr key={emp.value.id}>
                        <td>{emp.value.fname}</td>
                        <td>{emp.value.lname}</td>
                        <td>{emp.value.age}</td>
                        <td>{emp.value.city}</td>
                        <td>{emp.value.country}</td>
                    </tr>
                </template>
                <template if:true={emp.last}>
                    <tr key={emp.value.id}>
                        <td>{emp.value.fname}</td>
                        <td>{emp.value.lname}</td>
                        <td>{emp.value.age}</td>
                        <td>{emp.value.city}</td>
                        <td>{emp.value.country}</td>
                    </tr>
                </template>
            </template>
        </table>
    </lightning-card>

</template>
